<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Tabelas - Agrupar Elementos</title>
  </head>
  <body>
    <h1>Meu projeto web</h1>

    <!-- Início da tabela -->
    <table>
      <thead>
        <tr>
          <th>Nome do herói</th>
          <th>Velocidade</th>
          <th>Agilidade</th>
          <th>Força</th>
          <th>XP</th>
        </tr>
      </thead>

      <tbody>
        <!-- 1° Herói -->
        <tr>
          <td>Superman</td>
          <td>100</td>
          <td>98</td>
          <td>100</td>
          <td>99</td>
        </tr>

        <!-- 2° Heroi -->
        <tr>
          <td>Mulher-maravilha</td>
          <td>100</td>
          <td>98</td>
          <td>97</td>
          <td>98</td>
        </tr>

        <!-- 3° Heroi -->
        <tr>
          <td>Homem-Aranha</td>
          <td>85</td>
          <td>94</td>
          <td>80</td>
          <td>87</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="5">Dados atualizados no 1° semestre</td>
        </tr>
      </tfoot>

      <!-- fim da tabela -->
    </table>
  </body>
</html>
